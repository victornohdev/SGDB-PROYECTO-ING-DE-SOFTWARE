<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdúTrack — Iniciar Sesión</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/img/logo.ico">
    <style>
        /* Estilos específicos del login */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #3F51B5 0%, #616CAC 100%);
        }

        .icono-campo i {
            font-size: 20px;
            color: #b0b0b0;

        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 58px 52px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
        }

        .login-logo {
            font-size: 46px;
            font-weight: 700;
            margin-bottom: -10px;
        }

        .login-logo .edu {
            color: var(--color-primario);
        }

        .login-logo .track {
            color: var(--color-texto);
        }

        .login-subtitulo {
            font-size: 18px;
            font-weight: 400;
            color: #676666;
            margin-top: 0;
            margin-bottom: 20px;
        }

        /* Tabs de rol */
        .rol-tabs {
            display: flex;
            background: var(--color-primario);
            border-radius: var(--radio-sm);
            padding: 5px;
            margin-bottom: 32px;
            gap: 4px;
            box-shadow: 6px 5px 18px rgba(0, 0, 0, 0.30);
        }

        .rol-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: WHITE;
            border: none;
            background: transparent;
            font-family: var(--fuente-principal);

        }

        .rol-tab.activo {
            background: white;
            color: var(--color-primario);
        }

        /* Inputs con ícono */
        .input-icono {
            position: relative;
        }

        .input-icono input {
            width: 100%;
            padding: 16px 48px 16px 18px;
            border: 1.5px solid var(--color-borde);
            border-radius: var(--radio-sm);
            font-family: var(--fuente-principal);
            font-size: 16px;
            color: var(--color-texto);
            background: white;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-icono input:focus {
            outline: none;
            border-color: var(--color-primario);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .input-icono input::placeholder {
            color: #b0b0b0;

        }

        .input-icono .icono-campo {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #b0b0b0;
            font-size: 18px;
            cursor: pointer;
            user-select: none;
        }

        /* Botón entrar */
        .btn-entrar {
            display: block;
            width: 60%;
            margin: 40px auto 0;
            padding: 16px;
            background: var(--color-primario);
            color: white;
            border: none;
            border-radius: var(--radio-sm);
            font-family: var(--fuente-principal);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-entrar:hover {
            background: var(--color-primario-dark);
            transform: translateY(-1px);
        }

        .btn-entrar:active {
            transform: translateY(0);
        }

        /* Mensaje de error */
        .error-msg {
    color: #ef4444;
    font-size: 13px;
    margin-top: 10px;
    margin-left: 4px;

    opacity: 0;
    transform: translateY(-4px);

    transition: all 0.2s ease;

    max-height: 0;
    overflow: hidden;
        }

        .error-msg.visible {
    opacity: 1;
    transform: translateY(0);

    max-height: 40px;
    margin-bottom: 10px;
        }

        .input-error {
            border-color: #ef4444 !important;
        }

        .form-grupo label {
            font-size: 15px;
            color: #8E8E93;
        }
    </style>
</head>

<body>

    <div class="login-screen">
        <div class="login-card">

            <!-- Logo -->
            <div class="login-logo">
                <span class="edu">Edú</span><span class="track">Track</span>
            </div>
            <p class="login-subtitulo">Sistema de control asistencias escolares</p>

            <!-- Tabs de rol -->
            <div class="rol-tabs">
                <button class="rol-tab activo" onclick="seleccionarRol('maestro', this)">Maestro</button>
                <button class="rol-tab" onclick="seleccionarRol('alumno', this)">Alumno</button>
                <button class="rol-tab" onclick="seleccionarRol('admin', this)">Admin</button>
            </div>


            <!-- Campo usuario -->
            <div class="form-grupo">
                <label for="usuario">USUARIO</label>
                <div class="input-icono">
                    <input type="text" id="usuario" placeholder="Ingresa tu usuario" autocomplete="off">
                    <span class="icono-campo">
                        <i class="fa-regular fa-user"></i>
                    </span>
                </div>


            </div>

            <!-- Campo contraseña -->
            <div class="form-grupo">
                <label for="contrasena">CONTRASEÑA</label>
                <div class="input-icono">
                    <input type="password" id="contrasena" placeholder="••••••••••••">
                    <span class="icono-campo" onclick="togglePassword()" id="ojo">
                        <i class="fa-regular fa-eye"></i>
                    </span>
                </div>
            </div>
            <!-- Mensaje de error -->
            <div class="error-msg" id="error-msg">
                ⚠️ Usuario o contraseña incorrectos. Intenta de nuevo.
            </div>
            <!-- Botón entrar -->
            <button class="btn-entrar" onclick="iniciarSesion()">Entrar</button>

        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>

</body>

</html>
