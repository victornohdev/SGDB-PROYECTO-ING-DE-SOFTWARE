<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdúTrack — Dashboard Maestro</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/png" href="../assets/img/logo.ico">
</head>
<body>

  <!-- NAVBAR -->
  <div id="navbar"></div>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="main">

    <!-- Encabezado -->
    <div class="page-header">
      <div>
        <div class="page-titulo">Dashboard</div>
        <div class="page-subtitulo" id="saludo">Bienvenido</div>
      </div>
      <a href="pase-lista.html" class="btn btn-primario btn-sm"><i class="fa-solid fa-check"></i> Pasar Lista</a>
    </div>

    <!-- Tarjetas de estadísticas -->
    <div class="stats-grid-3">
      <div class="stat-card">
        <div class="stat-label">Mis Grupos</div>
        <div class="stat-valor azul" id="total-grupos">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Listas Hoy</div>
        <div class="stat-valor verde" id="listas-hoy">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pendientes</div>
        <div class="stat-valor amarillo" id="listas-pendientes">—</div>
      </div>
    </div>

    <!-- Estado de listas por grupo -->
    <div class="card" style="margin-bottom:20px">
      <div class="card-header">
        <div class="card-titulo">Estado de Lista — Hoy</div>
      </div>
      <div class="card-body" style="padding:0">
        <div class="tabla-wrap">
          <table>
            <thead>
              <tr>
                <th>Grupo</th>
                <th>Alumnos</th>
                <th>Estado</th>
                <th>Acción</th>
              </tr>
            </thead>
            <tbody id="tabla-grupos">
              <tr>
                <td colspan="4">
                  <div class="vacio">
                    <div class="vacio-icono"><i class="fa-solid fa-spinner"></i></div>
                    <div class="vacio-texto">Cargando grupos...</div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Asistencias recientes -->
    <div class="card">
      <div class="card-header">
        <div class="card-titulo">Mis Asistencias Recientes</div>
      </div>
      <div class="card-body" style="padding:0">
        <div class="tabla-wrap">
          <table>
            <thead>
              <tr>
                <th>Alumno</th>
                <th>Fecha</th>
                <th>Grupo</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody id="tabla-asistencias">
              <tr>
                <td colspan="4">
                  <div class="vacio">
                    <div class="vacio-icono"><i class="fa-solid fa-spinner"></i></div>
                    <div class="vacio-texto">Cargando asistencias...</div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </main>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/dashboard-maestro.js"></script>

</body>
</html>
