<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdúTrack — Alumnos</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/png" href="../assets/img/logo.ico">
</head>
<body>

  <!-- NAVBAR -->
  <div id="navbar"></div>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="main">

    <!-- Encabezado -->
    <div class="page-header">
      <div>
        <div class="page-titulo">Alumnos</div>
        <div class="page-subtitulo" id="subtitulo">Cargando...</div>
      </div>
      <button class="btn btn-success btn-sm" onclick="abrirModal()">
       <i class="fa-solid fa-plus"></i>Nuevo Alumno
      </button>
    </div>

    <!-- Tabla de alumnos -->
    <div class="card">
      <div class="card-header">
        <div class="card-titulo">Lista de Alumnos</div>
        <div class="search-bar">
          <span class="search-icono"><i class="fa-solid fa-magnifying-glass"></i></span>
          <input
            type="text"
            placeholder="Buscar alumno..."
            oninput="filtrarTabla(this)"
            style="width:220px"
          >
        </div>
      </div>
      <div class="card-body" style="padding:0">
        <div class="tabla-wrap">
          <table>
            <thead>
              <tr>
                <th>Nombre</th>
                <th>N° Control</th>
                <th>Grado / Grupo</th>
                <th>Cumpleaños</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-alumnos">
              <tr>
                <td colspan="5">
                  <div class="vacio">
                    <div class="vacio-icono"><i class="fa-solid fa-spinner"></i></div>
                    <div class="vacio-texto">Cargando alumnos...</div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </main>

  <!-- MODAL REGISTRAR / EDITAR ALUMNO -->
  <div class="modal-backdrop" id="modal-alumno">
    <div class="modal">

      <div class="modal-header">
        <div class="modal-titulo" id="modal-titulo">Registrar Alumno</div>
        <button class="modal-cerrar" onclick="cerrarModal()">✕</button>
      </div>

      <div class="form-grid">

        <div class="form-grupo full">
          <label>Nombre completo</label>
          <input type="text" id="al-nombre" placeholder="Ej: Ivette García López">
        </div>

        <div class="form-grupo">
          <label>Número de control</label>
          <input type="text" id="al-control" placeholder="Ej: 22100001">
        </div>

        <div class="form-grupo">
          <label>Fecha de nacimiento</label>
          <input type="date" id="al-cumple">
        </div>

<div class="form-grupo">
  <label>Grado</label>
  <select id="al-grado" onchange="filtrarGruposPorGrado(this.value)">
    <option value="">Selecciona</option>
    <option value="1">1°</option>
    <option value="2">2°</option>
    <option value="3">3°</option>
    <option value="4">4°</option>
    <option value="5">5°</option>
    <option value="6">6°</option>
  </select>
</div>

<div class="form-grupo">
  <label>Grupo</label>
  <select id="al-grupo">
    <option value="">Selecciona grado primero</option>
  </select>
</div>

      </div>

      <!-- Error en modal -->
      <div class="error-modal" id="error-modal"
        style="display:none;color:var(--color-rojo);font-size:13px;margin-top:8px">
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline btn-sm" onclick="cerrarModal()">Cancelar</button>
        <button class="btn btn-success btn-sm" onclick="guardarAlumno()">Guardar</button>
      </div>

    </div>
  </div>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/alumnos.js"></script>

</body>
</html>
