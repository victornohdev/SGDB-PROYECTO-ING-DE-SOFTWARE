<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdúTrack — Mi Asistencia</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
</head>
<body>

  <!-- NAVBAR -->
  <div id="navbar"></div>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="main">

    <!-- Encabezado -->
    <div class="page-header">
      <div>
        <div class="page-titulo">Mi Asistencia</div>
        <div class="page-subtitulo" id="nombre-alumno">Cargando...</div>
      </div>
    </div>

    <!-- Estadísticas -->
    <div class="stats-grid-3">
      <div class="stat-card">
        <div class="stat-label">Asistencias</div>
        <div class="stat-valor verde" id="total-asistencias">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Faltas</div>
        <div class="stat-valor rojo" id="total-faltas">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Retardos</div>
        <div class="stat-valor amarillo" id="total-retardos">—</div>
      </div>
    </div>

    <!-- Barra de porcentaje -->
    <div class="card" style="margin-bottom:20px">
      <div class="card-body">
        <div class="d-flex justify-between align-center" style="margin-bottom:8px">
          <span style="font-weight:600">Porcentaje de asistencia</span>
          <span style="font-weight:700;font-size:18px" id="pct-texto">—</span>
        </div>
        <div class="progress-bar" style="height:10px">
          <div class="progress-fill" id="progress-asistencia" style="width:0%"></div>
        </div>
        <div style="margin-top:8px;font-size:12px;color:var(--color-texto2)">
           Se requiere mínimo 80% de asistencia para aprobar
        </div>
      </div>
    </div>

    <!-- Filtro por fecha -->
    <div class="card" style="margin-bottom:20px">
      <div class="card-body">
        <div class="form-grid">
          <div class="form-grupo" style="margin:0">
            <label>Fecha inicio</label>
            <input type="date" id="fecha-inicio">
          </div>
          <div class="form-grupo" style="margin:0">
            <label>Fecha fin</label>
            <input type="date" id="fecha-fin">
          </div>
          <div class="form-grupo" style="margin:0;display:flex;align-items:flex-end">
            <button class="btn btn-primario btn-sm btn-full" onclick="filtrarHistorial()">
              <i class="fa-solid fa-filter"></i>Filtrar
            </button>
          </div>
          <div class="form-grupo" style="margin:0;display:flex;align-items:flex-end">
            <button class="btn btn-outline btn-sm btn-full" onclick="limpiarFiltro()">
              <i class="fa-solid fa-eraser"></i> Limpiar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Historial completo -->
    <div class="card">
      <div class="card-header">
        <div class="card-titulo">Historial de Asistencias</div>
        <span class="badge badge-gris" id="total-registros">0 registros</span>
      </div>
      <div class="card-body" style="padding:0">
        <div class="tabla-wrap">
          <table>
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Grupo</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody id="tabla-historial">
              <tr>
                <td colspan="3">
                  <div class="vacio">
                    <div class="vacio-icono"><i class="fa-solid fa-spinner"></i></div>
                    <div class="vacio-texto">Cargando historial...</div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/mi-asistencia.js"></script>

</body>
</html>
