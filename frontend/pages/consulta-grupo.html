<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdúTrack — Consulta por Grupo</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!-- NAVBAR -->
  <div id="navbar"></div>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="main">

    <!-- Encabezado -->
    <div class="page-header">
      <div>
        <div class="page-titulo">Asistencia por Grupo</div>
        <div class="page-subtitulo">Historial de asistencia de un grupo</div>
      </div>
    </div>

    <!-- Selector -->
    <div class="card" style="margin-bottom:20px">
      <div class="card-body">
        <div class="form-grid">
          <div class="form-grupo" style="margin:0">
            <label>Grupo</label>
            <select id="sel-grupo">
              <option value="">-- Elige un grupo --</option>
            </select>
          </div>
          <div class="form-grupo" style="margin:0">
            <label>Fecha inicio</label>
            <input type="date" id="fecha-inicio">
          </div>
          <div class="form-grupo" style="margin:0">
            <label>Fecha fin</label>
            <input type="date" id="fecha-fin">
          </div>
          <div class="form-grupo" style="margin:0;display:flex;align-items:flex-end">
            <button class="btn btn-primario btn-sm btn-full" onclick="cargarConsultaGrupo()">
              <i class="fa-solid fa-magnifying-glass"></i> Consultar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Resultados -->
    <div id="contenido-grupo">
      <div class="vacio">
        <div class="vacio-icono"><i class="fa-solid fa-chart-line"></i></div>
        <div class="vacio-texto">Selecciona un grupo y presiona Consultar</div>
      </div>
    </div>

  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/consultas.js"></script>

</body>
</html>
