<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdúTrack — Consulta General</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/png" href="../assets/img/logo.ico">
</head>
<body>

  <!-- NAVBAR -->
  <div id="navbar"></div>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="main">

    <!-- Encabezado -->
    <div class="page-header">
      <div>
        <div class="page-titulo">Consulta General</div>
        <div class="page-subtitulo">Asistencia de todos los grupos</div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="card" style="margin-bottom:20px">
      <div class="card-body">
        <div class="form-grid">
          <div class="form-grupo" style="margin:0">
            <label>Fecha inicio</label>
            <input type="date" id="fecha-inicio">
          </div>
          <div class="form-grupo" style="margin:0">
            <label>Fecha fin</label>
            <input type="date" id="fecha-fin">
          </div>
          <div class="form-grupo" style="margin:0">
            <label>Turno</label>
            <select id="filtro-turno">
              <option value="">Todos</option>
              <option value="Matutino">Matutino</option>
              <option value="Vespertino">Vespertino</option>
            </select>
          </div>
          <div class="form-grupo" style="margin:0;display:flex;align-items:flex-end">
            <button class="btn btn-primario btn-sm btn-full" onclick="cargarConsulta()">
              <i class="fa-solid fa-filter"></i>Filtrar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Resumen de grupos -->
    <div id="contenido-general">
      <div class="vacio">
        <div class="vacio-icono"><i class="fa-solid fa-chart-line"></i></div>
        <div class="vacio-texto">Selecciona un rango de fechas y presiona Filtrar</div>
      </div>
    </div>

  </main>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/consultas.js"></script>

</body>
</html>
